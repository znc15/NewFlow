name: Release flow.js

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: npm run release:check-version -- "${GITHUB_REF_NAME}"

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Build flow.js
        run: npm run build

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/flow.js
          generate_release_notes: true
